version: "3.9"
services:
  app:
    build:
      context: .
      dockerfile: docker/php/8.3/Dockerfile
    container_name: student_app
    working_dir: /var/www/
    volumes:
      - ./src:/var/www/
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/zz-www.conf
    depends_on:
      - db
    networks:
      - students-network

  web:
    image: nginx:latest
    container_name: student_web
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www/
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - students-network

  db:
    image: mysql:latest
    container_name: student_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: students
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3309:3309"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - students-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: student_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      UPLOAD_LIMIT: 300M
    networks:
      - students-network
    depends_on:
      - db

  redis:
    image: redis:latest
    container_name: student_redis
    ports:
      - "6379:6379"
    networks:
      - students-network

volumes:
  db_data:
networks:
  students-network: